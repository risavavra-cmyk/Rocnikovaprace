<!DOCTYPE html>
<html lang="en">
<head>

    <title>E-shop</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/solid.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><img src="images/ikonamoto.png" alt="Ikona" class="logo" /></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <form class="d-flex w-50" role="search">
                    <input class="form-control border border-warning rounded-start-pill" type="search" placeholder="Hledat..." aria-label="Hledat"/>
                    <span class="input-group-text bg-warning rounded-end-circle" id="addon-wrapping"><i class="fa fa-search"></i></span>
                </form>
                <div class="menu-bar d-flex justify-content-end ms-auto">
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">

                        <li class="nav-item">

                        <li class="nav-item">

                        </li>
                    </ul>
                </div>
            </div>
        </div>

            </ul>
            <a href="#" class="list-group-item list-group-item-action list-group-item-warning">Skútry<i class="fa fa-angle-right"></i></a>

                <li class="list-group-item list-group-item-action list-group-item-warning">do 50cc</li>

            </ul>
            <a href="#" class="list-group-item list-group-item-action list-group-item-warning">Helmy<i class="fa fa-angle-right"></i></a>

            </ul>

        <div class="slider">
            <div id="slider" class="carousel slide carousel-fade">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="images/motorky1.jpg" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img src="images/motorky2.jpg" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img src="images/motorky3.jpg" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img src="images/helma.jpg" class="d-block w-100">
                    </div>
                </div>
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#slider" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#slider" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#slider" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    <button type="button" data-bs-target="#slider" data-bs-slide-to="3" aria-label="Slide 4"></button>

            </div>
        </div>

        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <img src="images/motorky1.jpg">
                </div>

                        <i class="fa fa-star text-warning"></i>
                        <i class="fa fa-star text-warning"></i>
                        <i class="fa fa-star-half-o text-warning"></i>

                        <h5>100 000 Kč</h5>
                    </div>    
                </div>
                <div class="col-md-3">
                    <div class="product-top">
                        <img src="images/motorky2.jpg">
                        <div class="overlay-right">
                            <button type="button" class="btn btn-secondary" title="Rychlý nákup"><i class="fa-solid fa-eye"></i></button>

                        <i class="fa fa-star text-warning"></i>
                        <i class="fa fa-star text-warning"></i>

                        <h3>Motorka 2</h3>
                        <h5>120 000 Kč</h5>

                </div>
            </div>
        </div>
